<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School ERP - Chen ER Diagram</title>
    <style>

        .subtitle { text-align: center; margin: 0 0 16px; font-size: 14px; }
        .controls { text-align: center; margin: 15px 0; }
        .controls button {
            padding: 10px 24px; margin: 0 8px; font-size: 14px;
            border: none; border-radius: 6px; cursor: pointer;
            background: #111; color: #fff; font-weight: 600;
        }
        .controls button:hover { background: #000; }
        #diagram { text-align: center; overflow: auto; border: 1px solid #000; padding: 12px; }
        #diagram svg { max-width: 100%; height: auto; }
        .note { text-align: center; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

                    .identifying-inner { fill: none; stroke: #000; stroke-width: 2; }
                    .attribute { fill: #fff; stroke: #000; stroke-width: 2; }
                    .attribute-dashed { fill: #fff; stroke: #000; stroke-width: 2; stroke-dasharray: 6 4; }
                    .line { stroke: #000; stroke-width: 2; fill: none; }
                    .line-thin { stroke: #000; stroke-width: 1.5; fill: none; }

                    .text-rel { font-size: 18px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
                    .text-attr { font-size: 17px; text-anchor: middle; dominant-baseline: middle; }

    <p class="note">Prepared in strict Chen style for academic submission (black &amp; white, aligned, notation-compliant).</p>

    <script>
        function downloadSVG() {
            const svgEl = document.getElementById('diagramSvg');
            const svgData = new XMLSerializer().serializeToString(svgEl);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'school-erp-er-diagram.svg';
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadPNG() {
            const svgEl = document.getElementById('diagramSvg');
            const svgData = new XMLSerializer().serializeToString(svgEl);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = function () {
                canvas.width = img.width * 2;
                canvas.height = img.height * 2;
                ctx.scale(2, 2);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = 'school-erp-er-diagram.png';
                a.click();
            };
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
        }
    </script>
</body>
</html>
